<html>
<head>

    {% load static %}
     <link rel="stylesheet" href="{% static 'test/next.css' %}">
</head>
<body>
     <ul>
  {% for item in items %}

  {% endfor %}
</ul>

    <div id="toolbar">
<a href="/delete/">

</a>

    <button class="hozon">>></button>
  </form>

<script src="{% static 'test/script.js' %}"></script>
</body>
</html>
