}
    function sitasema(){

        sitaExpand -= 500;

}
    function migihiro(){                             //横幅広
        migiExpand +=500;
       
        updateWidth();
        
    }

        if(migiExpand > 0){
        migiExpand -= 500;
    }

    const circle = document.querySelector('.circle');

    function uehiro(){

    const addSize = 500;

    ueExpand += addSize;

    updateHeight();

    document.querySelectorAll(".circle").forEach(circle => {

        const currentTop =
            parseInt(circle.style.top) || circle.offsetTop;

        circle.style.top =

}
    function uesema(){

        window.scrollBy(0, -addSize);

}

}

function kesu(){
     if(!selectedCircle) return;

    // 関係する線を削除
    for(let i = edges.length - 1; i >= 0; i--){

        if(
            edges[i].from === selectedCircle ||

    selectedCircle = null;

    // 線更新
    updateLines();
}

const edges = [];

function updateLines() {

    const svg = document.getElementById("lineLayer");

    svg.innerHTML = "";

    edges.forEach(edge => {

        const fromRect = edge.from.getBoundingClientRect();
        const toRect = edge.to.getBoundingClientRect();

        // 中心座標
        const cx1 =
            fromRect.left + fromRect.width / 2 + window.scrollX;

        const cy1 =
            fromRect.top + fromRect.height / 2 + window.scrollY;

        const cx2 =
            toRect.left + toRect.width / 2 + window.scrollX;

        const cy2 =
            toRect.top + toRect.height / 2 + window.scrollY;

        // 方向ベクトル
        const dx = cx2 - cx1;
        const dy = cy2 - cy1;

        // 距離
        const dist = Math.hypot(dx, dy);

        // 単位ベクトル
        const ux = dx / dist;
        const uy = dy / dist;

        // 楕円の半径
        const rx1 = fromRect.width / 2;
        const ry1 = fromRect.height / 2;

        const rx2 = toRect.width / 2;
        const ry2 = toRect.height / 2;

        // 楕円境界までの倍率
        const t1 =
            1 / Math.sqrt(
                (ux * ux) / (rx1 * rx1) +
                (uy * uy) / (ry1 * ry1)
            );

        const t2 =
            1 / Math.sqrt(
                (ux * ux) / (rx2 * rx2) +
                (uy * uy) / (ry2 * ry2)
            );

        // 楕円の外周座標
        const x1 = cx1 + ux * t1;
        const y1 = cy1 + uy * t1;

        const x2 = cx2 - ux * t2;
        const y2 = cy2 - uy * t2;

        // SVG line生成
        const line = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "line"
        );

        line.setAttribute("x1", x1);
        line.setAttribute("y1", y1);

        line.setAttribute("x2", x2);
        line.setAttribute("y2", y2);

        line.setAttribute("stroke", "black");
        line.setAttribute("stroke-width", "3");

        svg.appendChild(line);
    });
}
document.querySelectorAll(".circle").forEach(el => {

  let isDragging = false;
  let offsetX = 0;
  let offsetY = 0;

  el.addEventListener("mousedown", (e) => {
    if (window.getSelection().toString()) return;
    document.querySelectorAll(".circle").forEach(c => {
    c.classList.remove("selected");
  });
  el.classList.add("selected");
    isDragging = true;
    offsetX = e.pageX - el.offsetLeft;
    offsetY = e.pageY - el.offsetTop;

    el.style.cursor = "grabbing";
    // いったん全解除
   

    // 今のやつを選択
    el.classList.add("selected");
  });
  
  document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  const x = e.pageX;
  const y = e.pageY;

  // ドラッグ移動
  el.style.left = (x - offsetX) + "px";
  el.style.top = (y - offsetY) + "px";
  updateLines();
  // ===== ここから自動拡張 =====

  const margin = 1; // 端判定

  // 右端
  if (x > window.innerWidth - margin) {
    document.body.style.width =
      document.body.offsetWidth + 100 + "px";
  }

  // 下端
  if (y > window.innerHeight - margin) {
    document.body.style.height =
      document.body.offsetHeight + 1 + "px";
  }

  // 左端
  if (x < margin) {
    window.scrollBy(20, 0);
  }

  // 上端
  if (y < margin) {
    window.scrollBy(0, 20);
  }

  // 自動スクロール
  if (x > window.innerWidth - margin) {
    window.scrollBy(20, 0);
  }

  if (y > window.innerHeight - margin) {
    window.scrollBy(0, 20);
  }
   
});

  document.addEventListener("mouseup", () => {
    isDragging = false;
    el.style.cursor = "grab";
  });

});
document.addEventListener("dblclick", (e) => {
  

  const newCircle = document.createElement("div");

  newCircle.className = "circle";
  newCircle.contentEditable = "true";
  newCircle.textContent = "文字を入力";

  // クリックした位置に出す
  newCircle.style.position = "absolute";
  newCircle.style.left = e.pageX + "px";
  newCircle.style.top = e.pageY + "px";
  document.body.appendChild(newCircle);
  makeDraggable(newCircle);
  if (selectedCircle) {
    edges.push({ from: selectedCircle, to: newCircle });
   
  }
  
  // ドラッグできるようにする
  makeDraggable(newCircle);
  
    updateLines();
  
});

let selectedCircle = null;
function makeDraggable(el) {
  let isDragging = false;
  let offsetX = 0;
  let offsetY = 0;

  el.addEventListener("mousedown", (e) => {
    if (window.getSelection().toString()) return;
   document.querySelectorAll(".circle").forEach(c => c.classList.remove("selected"));
    el.classList.add("selected");
     selectedCircle = el; 
    isDragging = true;
    offsetX = e.pageX - el.offsetLeft;
    offsetY = e.pageY - el.offsetTop;

    el.style.cursor = "grabbing";
  });

  document.addEventListener("mousemove", (e) => {
    if (!isDragging) return;

    el.style.left = (e.pageX - offsetX) + "px";
    el.style.top = (e.pageY - offsetY) + "px";
    updateLines();
  });

  document.addEventListener("mouseup", () => {
    isDragging = false;
    el.style.cursor = "grab";
  });
}
document.addEventListener("mousedown", (e) => {
    if (e.clientY <= 100) return;
if (e.target.closest(".circle")) return;
if (e.target.closest("#colorpicker")) return;

  if (!e.target.classList.contains("circle")) {
    document.querySelectorAll(".circle").forEach(c => {
      c.classList.remove("selected");
    });
  }
});
window.addEventListener("scroll", updateLines);
</script>
