     <p id="r">ここに入力</p>
    
</form>
    <p class="msg">{{ msg|linebreaksbr }}</p>

</ul>

  <button  class="uehiroku" onclick="uehiro()">+</button>
  <button class="uesemaku" onclick="uesema()">-</button>

  <button class="hidarihiroku" onclick="hidarihiro()">+</button>

  <button class="kesu" onclick="kesu()">丸を消す</button>

  <input id="colorpicker" type="color" value="#888888">
  <p class="sitahaba">下幅</p>
  <p class="uehaba">上幅</p>
  <p class="migihaba">右幅</p>
  <p class="hidarihaba">左幅</p>
  <p class="haikei">背景色</p>
  <p class="maruiro">丸の色</p>
</div>
<div .class="main"></div>

<div id="canvas"></div>

<style>

    .moji{

    }
    #lineLayer{

        left: 0;
        top: 0;

        pointer-events: none;
        overflow: visible;
    }
    #canvas {
        margin-top: 80px; /* ツールバー分ずらす */

    min-width: 120px;

    border: 1px solid #333;

    padding: 20px;

    box-sizing: border-box;
    box-shadow: 5px 5px 10px #444444;
    overflow-wrap: break-word;

    white-space: pre-wrap;

    

    
}
    .kensaku{border: 1.2px solid #888888; /*枠の線とその色*/

        height: 27px;/*縦幅*/

        z-index: 20;
        top: 60px;
        left: 370px;
        border-radius: 20px;/*バーの角の丸さ*/}

        background-color: whitesmoke;
        border:1.2px solid #666666;

        position: fixed;
        top: -20px;

        height: 100px;
       width: 1500px;}
    .msg{z-index: 1;
        font-size: 20px;
        width: 1000px;
        position: absolute;
        margin-top: 200px;
        margin-left: 200px;
        scrollbar-width: thin;
        scrollbar-color: #666 #222;}
    .msg::-webkit-scrollbar {
        width: 12px;
    }

    .msg::-webkit-scrollbar-track {
        background: #222222;
        border-radius: 10px;
    }

    .msg::-webkit-scrollbar-thumb {

        border-radius: 10px;
    }

    }
