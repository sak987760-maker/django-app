<!DOCTYPE html>
<html>
<head>
     <meta charset="UTF-8">
     <title>ternal Mindmap</title>
     {% load static %}

     <link rel="stylesheet" href="{% static 'test/next.css' %}">
</head>
<body>
    <p class="msg">{{ msg|linebreaksbr }}</p>
    <div id="toolbar">
        <ul>
  {% for item in items %}
    <li class="moji">{{ item.text }}</li>
  {% endfor %}
</ul>
  <form method="POST"  action="/save/">
    {% csrf_token %}

    <input type="text" name="text">
    <button class="hozon">保存</button>
  </form>
<style>

    body{background-color: whitesmoke;
        color:#2A2A2A;
        width: 1000px;
        height: 600px;
    }
    #toolbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 500px;
        height: 80px;
        background-color: #00A0A0;
        color: whitesmoke;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        box-shadow: 5px 5px 10px #444444;
       
        border: 1px solid #ccc;
  
        z-index: 7;
    }
    .moji{
        color: #222;
    }
    </style>
<script>
</script>
</body>
</html>
