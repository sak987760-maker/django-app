<!DOCTYPE html>
<html>
<head>
     <meta charset="UTF-8">
     <title>YAMABIKO</title>
    {% load static %}
     <link rel="stylesheet" href="{% static 'test/next.css' %}">
</head>
<body>
    
    <form method="post" action="/update_icon/" enctype="multipart/form-data">
  {% csrf_token %}
  <label for="iconInput" >
    <img id="iconPreview" src="{% if request.user.header %}{{ request.user.header.url }}{% else %}{% static 'test/default_icon.png' %}{% endif %}" alt="ヘッダー">
  </label>
  <input type="file" id="iconInput" name="icon" accept="image/*" style="display: none;" >
</form>
<div class="headshadow"></div>
    <p class="name">{{ request.user.name }}</p>

{% if request.user.icon %}
    <img id="iconImage" src="{{ request.user.icon.url }}" alt="アイコン">
{% endif %}
     <ul>
  {% for item in items %}
  <div>
    <li class="moji"><div class="waku">{{ item.text|safe }}</div></li>
  {% endfor %}
</ul>
    
    <!--<p class="username">{{ request.user.username }}</p>-->
    <p class="msg">{{ msg|linebreaksbr }}</p>
    <div class="toolbar"></div>
  <form method="POST"  action="/save/">
    {% csrf_token %}
    <button class="hozon">>></button>
    <textarea type="text" name="text"  cols="30" maxlength="5000"></textarea>
  </form>
<script src="{% static 'test/script.js' %}"></script>
</body>
</html>
