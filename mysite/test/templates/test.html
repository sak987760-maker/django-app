<!DOCTYPE html>
<html>
<head>
     <meta charset="UTF-8">
     <title>ternal Mindmap</title>
    {% load static %}
     <link rel="stylesheet" href="{% static 'test/next.css' %}">
</head>
<body>
     <ul>
  {% for item in items %}
  <div>
    <li class="moji"><div class="waku"><span class="mark">★</span>{{ item.text|safe }}</div></li>
  {% endfor %}
</ul>
    <p class="msg">{{ msg|linebreaksbr }}</p>
    <div id="toolbar">
        <label for="iconInput">
  <img id="iconPreview" src="{% static 'default_icon.png' %}" alt="アイコン">
</label>
<input type="file" id="iconInput" accept="image/*" style="display: none;">
<a href="/delete/">
  <button>全部削除</button>
</a>
  <form method="POST"  action="/save/">
    {% csrf_token %}

    <textarea type="text" name="text"  cols="30" maxlength="5000"></textarea>
    <button class="hozon">>></button>
  </form>

<script src="{% static 'test/script.js' %}"></script>
</body>
</html>
